<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <defs>
    <clipPath id="cc">
      <circle cx="100" cy="100" r="87"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <circle cx="100" cy="100" r="99" fill="#050810"/>

  <!-- Clipped interior -->
  <g clip-path="url(#cc)">

    <!-- Concentric clock arcs (right half) -->
    <path d="M 100 35 A 65 65 0 0 1 100 165" stroke="white" stroke-width="1.5" stroke-dasharray="4 3" opacity="0.3" fill="none"/>
    <path d="M 100 50 A 50 50 0 0 1 100 150" stroke="white" stroke-width="1" opacity="0.2" fill="none"/>

    <!-- Tick marks -->
    <line x1="100" y1="16" x2="100" y2="27" stroke="white" stroke-width="3.5" stroke-linecap="round" opacity="0.9"/>
    <line x1="122" y1="20" x2="118" y2="30" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.65"/>
    <line x1="142" y1="28" x2="136.5" y2="37" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.65"/>
    <line x1="159" y1="41" x2="152" y2="48" stroke="white" stroke-width="2.5" stroke-linecap="round" opacity="0.8"/>
    <line x1="172" y1="59" x2="163.5" y2="63.5" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.65"/>
    <line x1="180" y1="79" x2="171" y2="81.5" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.65"/>
    <line x1="183" y1="100" x2="173" y2="100" stroke="white" stroke-width="3.5" stroke-linecap="round" opacity="0.9"/>
    <line x1="180" y1="121" x2="171" y2="118.5" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.65"/>
    <line x1="172" y1="141" x2="163.5" y2="136.5" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.65"/>
    <line x1="159" y1="159" x2="152" y2="152" stroke="white" stroke-width="2.5" stroke-linecap="round" opacity="0.8"/>
    <line x1="142" y1="172" x2="136.5" y2="163" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.65"/>
    <line x1="122" y1="180" x2="118" y2="170" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.65"/>
    <line x1="100" y1="184" x2="100" y2="174" stroke="white" stroke-width="3.5" stroke-linecap="round" opacity="0.9"/>

    <!-- Neural network lines -->
    <g stroke="white" stroke-width="1.2" opacity="0.4" fill="none">
      <line x1="42" y1="62" x2="65" y2="47"/>
      <line x1="42" y1="62" x2="56" y2="88"/>
      <line x1="65" y1="47" x2="80" y2="68"/>
      <line x1="56" y1="88" x2="80" y2="68"/>
      <line x1="56" y1="88" x2="36" y2="110"/>
      <line x1="36" y1="110" x2="62" y2="122"/>
      <line x1="62" y1="122" x2="78" y2="68"/>
      <line x1="62" y1="122" x2="48" y2="148"/>
      <line x1="42" y1="62" x2="26" y2="85"/>
      <line x1="26" y1="85" x2="36" y2="110"/>
      <line x1="65" y1="47" x2="78" y2="25"/>
      <line x1="78" y1="25" x2="80" y2="68"/>
    </g>

    <!-- Neural nodes -->
    <g fill="white">
      <circle cx="42" cy="62" r="4" opacity="0.9"/>
      <circle cx="65" cy="47" r="3.5" opacity="0.85"/>
      <circle cx="80" cy="68" r="4" opacity="0.9"/>
      <circle cx="56" cy="88" r="3" opacity="0.8"/>
      <circle cx="26" cy="85" r="2.5" opacity="0.65"/>
      <circle cx="36" cy="110" r="4" opacity="0.9"/>
      <circle cx="62" cy="122" r="3.5" opacity="0.85"/>
      <circle cx="48" cy="148" r="3" opacity="0.7"/>
      <circle cx="78" cy="25" r="2.5" opacity="0.6"/>
    </g>

    <!-- Lightning bolt hands — solid filled polygon shapes -->
    <!-- Hour hand: pointing to ~10 o'clock (upper-left) -->
    <path d="M 103 97 L 69 78 L 77 68 L 52 65 L 48 70 L 60 74 L 73 84 L 97 103 Z" fill="white"/>
    <!-- Minute hand: pointing to ~2 o'clock (upper-right, mirror of hour hand) -->
    <path d="M 97 97 L 131 78 L 123 68 L 148 65 L 152 70 L 140 74 L 127 84 L 103 103 Z" fill="white"/>

    <!-- Center pivot -->
    <circle cx="100" cy="100" r="7" fill="white"/>
    <circle cx="100" cy="100" r="12" fill="white" opacity="0.1"/>

    <!-- Smooth boundary curve (bottom-right) -->
    <path d="M 138 170 C 160 168, 178 150, 181 120" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.5" fill="none"/>

  </g>

  <!-- Complete circle border (same weight as SwiftShift font) -->
  <circle cx="100" cy="100" r="87" stroke="white" stroke-width="5" fill="none" opacity="0.95"/>

</svg>
