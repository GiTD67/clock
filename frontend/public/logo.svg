<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="cc">
      <circle cx="100" cy="100" r="87"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <circle cx="100" cy="100" r="99" fill="#050810"/>

  <!-- Clipped interior -->
  <g clip-path="url(#cc)">

    <!-- RIGHT: Concentric clock arcs (right half) -->
    <path d="M 100 35 A 65 65 0 0 1 100 165" stroke="white" stroke-width="0.8" stroke-dasharray="4 3" opacity="0.3" fill="none"/>
    <path d="M 100 50 A 50 50 0 0 1 100 150" stroke="white" stroke-width="0.8" opacity="0.2" fill="none"/>

    <!-- RIGHT: Tick marks (right half, -90° to +90°) -->
    <line x1="100" y1="16" x2="100" y2="24" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.9"/>
    <line x1="121.5" y1="19.8" x2="119.4" y2="27.6" stroke="white" stroke-width="1" stroke-linecap="round" opacity="0.6"/>
    <line x1="141.5" y1="28.1" x2="137.5" y2="35" stroke="white" stroke-width="1" stroke-linecap="round" opacity="0.6"/>
    <line x1="158.7" y1="41.3" x2="153" y2="47" stroke="white" stroke-width="1.5" stroke-linecap="round" opacity="0.8"/>
    <line x1="171.9" y1="58.5" x2="165" y2="62.5" stroke="white" stroke-width="1" stroke-linecap="round" opacity="0.6"/>
    <line x1="180.2" y1="78.5" x2="172.5" y2="80.6" stroke="white" stroke-width="1" stroke-linecap="round" opacity="0.6"/>
    <line x1="183" y1="100" x2="175" y2="100" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.9"/>
    <line x1="180.2" y1="121.5" x2="172.5" y2="119.4" stroke="white" stroke-width="1" stroke-linecap="round" opacity="0.6"/>
    <line x1="171.9" y1="141.5" x2="165" y2="137.5" stroke="white" stroke-width="1" stroke-linecap="round" opacity="0.6"/>
    <line x1="158.7" y1="158.7" x2="153" y2="153" stroke="white" stroke-width="1.5" stroke-linecap="round" opacity="0.8"/>
    <line x1="141.5" y1="171.9" x2="137.5" y2="165" stroke="white" stroke-width="1" stroke-linecap="round" opacity="0.6"/>
    <line x1="121.5" y1="180.2" x2="119.4" y2="172.5" stroke="white" stroke-width="1" stroke-linecap="round" opacity="0.6"/>
    <line x1="100" y1="184" x2="100" y2="176" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.9"/>

    <!-- LEFT: Neural network connection lines -->
    <g stroke="white" stroke-width="0.8" opacity="0.45" fill="none">
      <line x1="42" y1="62" x2="65" y2="47"/>
      <line x1="42" y1="62" x2="56" y2="88"/>
      <line x1="65" y1="47" x2="80" y2="68"/>
      <line x1="56" y1="88" x2="80" y2="68"/>
      <line x1="56" y1="88" x2="36" y2="110"/>
      <line x1="36" y1="110" x2="62" y2="122"/>
      <line x1="62" y1="122" x2="78" y2="68"/>
      <line x1="62" y1="122" x2="48" y2="148"/>
      <line x1="42" y1="62" x2="26" y2="85"/>
      <line x1="26" y1="85" x2="36" y2="110"/>
      <line x1="65" y1="47" x2="78" y2="25"/>
      <line x1="78" y1="25" x2="80" y2="68"/>
    </g>

    <!-- LEFT: Neural nodes -->
    <g filter="url(#glow)" fill="white">
      <circle cx="42" cy="62" r="3.5" opacity="0.95"/>
      <circle cx="65" cy="47" r="3" opacity="0.9"/>
      <circle cx="80" cy="68" r="3.5" opacity="0.95"/>
      <circle cx="56" cy="88" r="2.5" opacity="0.85"/>
      <circle cx="26" cy="85" r="2" opacity="0.7"/>
      <circle cx="36" cy="110" r="3.5" opacity="0.95"/>
      <circle cx="62" cy="122" r="3" opacity="0.9"/>
      <circle cx="48" cy="148" r="2.5" opacity="0.75"/>
      <circle cx="78" cy="25" r="2" opacity="0.65"/>
    </g>

    <!-- CENTER: Lightning bolt hands (10 o'clock and 2 o'clock) -->
    <path d="M 100 100 L 87 83 L 93 78 L 74 52" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>
    <path d="M 100 100 L 113 83 L 107 78 L 126 52" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>

    <!-- Center pivot -->
    <circle cx="100" cy="100" r="5" fill="white" filter="url(#glow)"/>
    <circle cx="100" cy="100" r="10" fill="white" opacity="0.1"/>

    <!-- BOTTOM RIGHT: smooth boundary curve -->
    <path d="M 138 170 C 160 168, 178 150, 181 120" stroke="white" stroke-width="1.5" stroke-linecap="round" opacity="0.5" fill="none"/>

  </g>

  <!-- Outer ring -->
  <circle cx="100" cy="100" r="87" stroke="white" stroke-width="2" filter="url(#glow)" opacity="0.9"/>

  <!-- TOP: Curved sweep arrow (left to right over the top) -->
  <path d="M 20 85 C 15 10, 185 10, 180 85" stroke="white" stroke-width="3.5" stroke-linecap="round" fill="none" filter="url(#glow)" opacity="0.9"/>
  <path d="M 180 85 L 185.5 77 L 175.5 77 Z" fill="white" opacity="0.9"/>

  <!-- BOTTOM LEFT: Speed/swoosh lines -->
  <line x1="12" y1="148" x2="55" y2="128" stroke="white" stroke-width="2.5" stroke-linecap="round" opacity="0.8" filter="url(#glow)"/>
  <line x1="7" y1="162" x2="50" y2="146" stroke="white" stroke-width="1.8" stroke-linecap="round" opacity="0.55"/>
  <line x1="14" y1="174" x2="47" y2="162" stroke="white" stroke-width="1.2" stroke-linecap="round" opacity="0.35"/>
</svg>
