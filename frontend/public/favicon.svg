  <path d="M 32 11 A 21 21 0 0 1 32 53" stroke="white" stroke-width="0.6" stroke-dasharray="2 2" opacity="0.3" fill="none"/>
  <!-- RIGHT: Tick marks -->
  <line x1="32" y1="5" x2="32" y2="9" stroke="white" stroke-width="1.2" stroke-linecap="round" opacity="0.9"/>
  <line x1="51.1" y1="12.9" x2="48.3" y2="15.7" stroke="white" stroke-width="0.8" stroke-linecap="round" opacity="0.6"/>
  <line x1="59" y1="32" x2="55" y2="32" stroke="white" stroke-width="1.2" stroke-linecap="round" opacity="0.9"/>
  <line x1="51.1" y1="51.1" x2="48.3" y2="48.3" stroke="white" stroke-width="0.8" stroke-linecap="round" opacity="0.6"/>
  <line x1="32" y1="59" x2="32" y2="55" stroke="white" stroke-width="1.2" stroke-linecap="round" opacity="0.9"/>
  <!-- LEFT: Neural network lines -->
  <line x1="12" y1="20" x2="20" y2="14" stroke="white" stroke-width="0.6" opacity="0.5"/>
  <line x1="12" y1="20" x2="17" y2="28" stroke="white" stroke-width="0.6" opacity="0.5"/>
  <line x1="17" y1="28" x2="11" y2="36" stroke="white" stroke-width="0.6" opacity="0.5"/>
  <line x1="11" y1="36" x2="18" y2="44" stroke="white" stroke-width="0.6" opacity="0.4"/>
  <!-- LEFT: Neural nodes -->
  <circle cx="12" cy="20" r="1.5" fill="white" opacity="0.9"/>
  <circle cx="20" cy="14" r="1.2" fill="white" opacity="0.85"/>
  <circle cx="17" cy="28" r="1.5" fill="white" opacity="0.9"/>
  <circle cx="11" cy="36" r="1.5" fill="white" opacity="0.9"/>
  <circle cx="18" cy="44" r="1.2" fill="white" opacity="0.8"/>
  <!-- CENTER: Lightning bolt hands -->
  <path d="M 32 32 L 26 24 L 29 22 L 22 13" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M 32 32 L 38 24 L 35 22 L 42 13" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
