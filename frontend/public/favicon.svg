  <path d="M 8 26 C 7 3, 57 3, 56 26" stroke="white" stroke-width="2.5" stroke-linecap="round" fill="none" opacity="0.9"/>
  <path d="M 56 26 L 59.5 20 L 53 20.5 Z" fill="white" opacity="0.9"/>
  <!-- BOTTOM LEFT: Speed lines -->
  <line x1="3" y1="46" x2="17" y2="40" stroke="white" stroke-width="1.8" stroke-linecap="round" opacity="0.75"/>
  <line x1="1" y1="53" x2="15" y2="48" stroke="white" stroke-width="1.2" stroke-linecap="round" opacity="0.5"/>
</svg>
